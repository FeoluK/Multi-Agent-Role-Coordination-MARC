# MPE simple_spread config — same PPO hyperparams as Overcooked (comparable),
# MARC knobs identical. ADAPTER selects the N-variant (mpe_spread = 3 agents;
# mpe_spread_3a/6a/9a = FACMAC scaling ladder). No layout / no shaped reward.
LR: 0.0005
NUM_ENVS: 64
NUM_STEPS: 256
TOTAL_TIMESTEPS: 5.0e6
UPDATE_EPOCHS: 4
NUM_MINIBATCHES: 16
GAMMA: 0.99
GAE_LAMBDA: 0.95
CLIP_EPS: 0.2
ENT_COEF: 0.01
VF_COEF: 0.5
MAX_GRAD_NORM: 0.5
ACTIVATION: relu
REW_SHAPING_HORIZON: 2.5e6   # unused for MPE (no shaped reward); harmless
ANNEAL_LR: true
SEED: 30
NUM_SEEDS: 1

ADAPTER: mpe_spread
NETWORK_KIND: vanilla
HISTORY: 16
LATENT_DIM: 32
LAMBDA_AUX: 0.1
BETA: 1.0
ZERO_TEAMMATE: false
ENV_KWARGS: {}
